server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: birthday-wisher
  datasource:
    url: jdbc:h2:file:./data/birthdaydb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Email Configuration (SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGeneration1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh}
  expiration: 86400000  # 24 hours in ms
  refresh-expiration: 604800000  # 7 days

# Twilio SMS Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
  auth-token: ${TWILIO_AUTH_TOKEN:your-auth-token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}
  enabled: ${TWILIO_ENABLED:false}

# Birthday Scheduler Configuration
birthday:
  scheduler:
    cron: "0 0 8 * * *"   # Every day at 8:00 AM
    timezone: "Asia/Kolkata"
  notification:
    email:
      enabled: true
      subject-template: "Happy Birthday, {name}! 🎂"
    sms:
      enabled: false
    days-before: 0         # 0 = on the day, can set to 1 for day-before reminder

# CORS Configuration
cors:
  allowed-origins: http://localhost:4200,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  max-age: 3600

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.birthday: INFO
    org.springframework.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
